<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phosphor Tuner</title>

<style>
:root {
  --bg: #0b0e12;
  --panel: #0e1319;
  --border: #1a1f27;
  --text: #cfd6df;
  --accent: #6aff9c;
  --accent2: #4da3ff;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* responsive container */
.player {
  width: min(92vw, 380px);
  padding: 16px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--panel);
  box-shadow: 0 0 25px rgba(0,0,0,0.7);
}

/* display */
.display {
  text-align: center;
  font-size: 20px;
  letter-spacing: 2px;
  color: var(--accent);
  margin-bottom: 8px;
}

/* waveform */
canvas {
  width: 100%;
  height: 80px;
  background: #05080c;
  border: 1px solid var(--border);
  margin-bottom: 10px;
}

/* controls */
.controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
}

/* knob */
.knob {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #2a2f38, #0a0d11);
  position: relative;
  touch-action: none;
}

.knob-line {
  position: absolute;
  width: 3px;
  height: 28%;
  background: var(--accent);
  top: 14%;
  left: 50%;
  transform-origin: bottom center;
  transform: translateX(-50%) rotate(0deg);
  box-shadow: 0 0 6px var(--accent);
}

/* buttons */
button {
  flex: 1;
  background: #10151c;
  border: 1px solid #1f2630;
  color: var(--text);
  padding: 8px;
  cursor: pointer;
}

button:active {
  border-color: var(--accent2);
}

/* file input */
input {
  width: 100%;
  margin-bottom: 10px;
}

/* mobile tweak */
@media (max-width: 420px) {
  .display { font-size: 18px; }
}
</style>
</head>

<body>

<div class="player">
  <div class="display" id="display">440 Hz</div>

  <canvas id="spectrum"></canvas>

  <input type="file" id="file" accept="audio/*">

  <div class="controls">
    <div class="knob" id="knob">
      <div class="knob-line" id="knobLine"></div>
    </div>

    <button id="playA">Original</button>
    <button id="playB">Shifted</button>
  </div>
</div>

<script>
let audioCtx;
let buffer;
let source;

let currentRatio = 1;
let targetHz = 440;

/* iOS unlock */
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}
document.body.addEventListener("touchstart", initAudio, { once: true });
document.body.addEventListener("click", initAudio, { once: true });

/* analyser */
let analyser;
const canvas = document.getElementById("spectrum");
const ctx2d = canvas.getContext("2d");

function setupAnalyser() {
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
}

/* draw spectrum */
function draw() {
  if (!analyser) return requestAnimationFrame(draw);

  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);

  ctx2d.clearRect(0,0,canvas.width,canvas.height);

  data.forEach((v,i) => {
    ctx2d.fillStyle = "#6aff9c";
    ctx2d.fillRect(i*2, canvas.height - v/2, 1.5, v/2);
  });

  requestAnimationFrame(draw);
}
draw();

/* load file */
document.getElementById("file").onchange = async e => {
  initAudio();
  setupAnalyser();

  const file = e.target.files[0];
  buffer = await audioCtx.decodeAudioData(await file.arrayBuffer());
};

/* safe play */
function play(rate=1) {
  if (!buffer || !audioCtx) return;

  if (source) {
    try { source.stop(); } catch {}
  }

  source = audioCtx.createBufferSource();
  source.buffer = buffer;
  source.playbackRate.value = rate;

  source.connect(analyser);
  analyser.connect(audioCtx.destination);

  source.start();
}

/* buttons */
document.getElementById("playA").onclick = () => play(1);
document.getElementById("playB").onclick = () => play(currentRatio);

/* knob physics */
const knob = document.getElementById("knob");
const knobLine = document.getElementById("knobLine");
const display = document.getElementById("display");

let angle = 0;
let velocity = 0;
let dragging = false;
let lastY = 0;

function update() {
  angle += velocity;
  velocity *= 0.9;

  angle = Math.max(-140, Math.min(140, angle));

  const norm = (angle + 140) / 280;
  targetHz = 420 + norm * 40;

  currentRatio = targetHz / 440;

  knobLine.style.transform =
    `translateX(-50%) rotate(${angle}deg)`;

  display.innerText = Math.round(targetHz) + " Hz";

  requestAnimationFrame(update);
}
update();

/* mouse */
knob.addEventListener("mousedown", e => {
  dragging = true;
  lastY = e.clientY;
});
window.addEventListener("mouseup", () => dragging = false);
window.addEventListener("mousemove", e => {
  if (!dragging) return;
  const dy = lastY - e.clientY;
  velocity = dy * 0.2;
  lastY = e.clientY;
});

/* touch */
knob.addEventListener("touchstart", e => {
  dragging = true;
  lastY = e.touches[0].clientY;
});

window.addEventListener("touchend", () => dragging = false);

window.addEventListener("touchmove", e => {
  if (!dragging) return;
  const dy = lastY - e.touches[0].clientY;
  velocity = dy * 0.2;
  lastY = e.touches[0].clientY;
});
</script>

</body>
</html>
